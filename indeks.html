<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atış Analiz Pro - Olimpik Atıcılık Sistemi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen">

    <div class="max-w-6xl mx-auto p-4 lg:p-8 space-y-6">
        
        <!-- Üst Panel / Kontrol Merkezi -->
        <header class="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-red-600 to-red-800 rounded-2xl flex items-center justify-center shadow-lg shadow-red-900/20">
                    <i data-lucide="target" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tighter">Atış Analiz <span class="text-red-500 italic">PRO</span></h1>
                    <div class="flex items-center gap-2 text-zinc-500">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                        <p class="text-[10px] font-bold uppercase tracking-widest text-emerald-500">Sistem Aktif</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <div class="relative flex-1 min-w-[200px]">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600 w-4 h-4"></i>
                    <input 
                        type="text" 
                        id="shooterName"
                        placeholder="Sporcu Ad Soyad" 
                        class="bg-zinc-800 border border-zinc-700 rounded-2xl py-3.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-red-500/50 w-full text-sm"
                    />
                </div>
                <button 
                    id="uploadBtn"
                    class="bg-red-600 hover:bg-red-500 disabled:bg-zinc-800 disabled:text-zinc-600 font-black py-3.5 px-8 rounded-2xl transition-all flex items-center justify-center gap-2 active:scale-95 text-sm uppercase"
                >
                    <i data-lucide="camera" class="w-5 h-5"></i>
                    Fotoğraf Yükle
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" />
            </div>
        </header>

        <!-- Hata Mesajı -->
        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/30 p-5 rounded-2xl flex items-center gap-4 text-red-400">
            <i data-lucide="alert-circle" class="w-6 h-6 flex-shrink-0"></i>
            <div class="text-sm">
                <p class="font-bold">Hata Oluştu</p>
                <p id="errorText" class="opacity-80"></p>
            </div>
        </div>

        <!-- Analiz Önizleme Alanı -->
        <div id="previewArea" class="hidden bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] flex flex-col items-center gap-8 shadow-3xl">
            <div class="relative group overflow-hidden rounded-3xl border-4 border-zinc-800">
                <img id="previewImg" src="" alt="Önizleme" class="max-h-96 object-contain" />
                
                <!-- Yükleme Ekranı (Analiz Sırasında) -->
                <div id="loadingOverlay" class="hidden absolute inset-0 bg-zinc-950/95 backdrop-blur-md flex flex-col items-center justify-center gap-6">
                    <div class="animate-spin text-red-600">
                        <i data-lucide="loader-2" class="w-16 h-16"></i>
                    </div>
                    <div class="text-center">
                        <p class="text-red-500 font-black text-lg uppercase tracking-widest animate-pulse">Analiz Ediliyor</p>
                        <p class="text-zinc-500 text-xs">Yapay zeka mermi deliklerini hesaplıyor...</p>
                    </div>
                </div>
            </div>
            
            <div id="previewActions" class="flex gap-4 w-full max-w-sm">
                <button id="cancelBtn" class="flex-1 py-3 bg-zinc-800 rounded-2xl text-sm font-bold hover:bg-zinc-700 transition-colors">Vazgeç</button>
                <button id="analyzeBtn" class="flex-2 py-3 bg-red-600 rounded-2xl text-sm font-black shadow-xl shadow-red-900/20 hover:bg-red-500 transition-colors">Analizi Başlat</button>
            </div>
        </div>

        <!-- Ana İçerik Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sol: Geçmiş Listesi -->
            <section class="lg:col-span-8 space-y-4">
                <h2 class="text-xs font-black uppercase text-zinc-500 tracking-[0.3em] flex items-center gap-2 px-4">
                    <i data-lucide="list-ordered" class="text-red-500 w-4 h-4"></i> Atış Geçmişi
                </h2>
                <div id="historyList" class="space-y-4">
                    <!-- Boş Durum -->
                    <div id="emptyState" class="bg-zinc-900/30 border border-dashed border-zinc-800 h-64 rounded-[2rem] flex flex-col items-center justify-center text-zinc-700">
                        <i data-lucide="upload" class="w-10 h-10 opacity-20 mb-4"></i>
                        <p class="text-sm">Henüz bir veri girişi yapılmadı.</p>
                    </div>
                </div>
            </section>

            <!-- Sağ: Liderlik Tablosu -->
            <aside class="lg:col-span-4 space-y-4">
                <h2 class="text-xs font-black uppercase text-zinc-500 tracking-[0.3em] flex items-center gap-2 px-4">
                    <i data-lucide="trophy" class="text-yellow-500 w-4 h-4"></i> Puan Tablosu
                </h2>
                <div id="leaderboard" class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-8 shadow-2xl space-y-4">
                    <p id="lbEmpty" class="text-zinc-700 text-xs italic text-center py-8">Veri yok.</p>
                    <!-- Sıralama öğeleri buraya gelecek -->
                </div>
            </aside>
        </div>
    </div>
